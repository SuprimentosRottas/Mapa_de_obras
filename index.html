<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obras Rottas Engenharia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #0f1923; --muted: #5a6674; --border: #dde3ea; --bg: #f5f7fa;
    --white: #ffffff; --accent: #e05c2a; --accent-light: #fdf0eb;
    --accent2: #1a4f7a; --panel-w: 360px;
  }
  body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--ink); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: var(--ink); color: var(--white); padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; z-index: 1000; }
  .logo-mark { width: 36px; height: 36px; background: var(--accent); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: "Syne", sans-serif; font-size: 18px; font-weight: 800; color: #fff; flex-shrink: 0; }
  header h1 { font-family: "Syne", sans-serif; font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  header h1 span { color: var(--accent); }
  .header-stats { margin-left: auto; display: flex; gap: 24px; }
  .stat { text-align: right; }
  .stat-num { font-family: "Syne", sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 10px; color: #8a9aaa; text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; }
  .layout { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: var(--panel-w); background: var(--white); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
  .sidebar-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sidebar-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
  .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; font-family: "Inter", sans-serif; font-size: 12px; color: var(--muted); cursor: pointer; transition: all .15s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
  .obra-list { overflow-y: auto; flex: 1; padding: 8px 0; }
  .obra-item { padding: 12px 20px; cursor: pointer; border-left: 3px solid transparent; transition: all .15s; border-bottom: 1px solid #f0f3f6; }
  .obra-item:hover { background: var(--bg); border-left-color: var(--border); }
  .obra-item.active { background: var(--accent-light); border-left-color: var(--accent); }
  .obra-name { font-weight: 600; font-size: 14px; color: var(--ink); margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
  .obra-location { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .obra-tags { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; align-items: center; }
  .tag { padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 500; background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .tag.uh { background: #eef4ff; color: #1a4f7a; border-color: #c5d9f0; }
  .tag.torres { background: #f0faf0; color: #2a6b35; border-color: #b8e0be; }
  .tag.estado-sc { background: #fff8ee; color: #b45309; border-color: #f8d99a; }
  .tag.estado-pr { background: #f3f0ff; color: #5b3fa6; border-color: #d0c6f5; }
  .metod-icons { display: flex; gap: 3px; align-items: center; }
  .metod-icons .material-symbols-outlined { font-size: 16px; color: var(--muted); }
  #map { flex: 1; z-index: 1; }
  .custom-popup .leaflet-popup-content-wrapper { border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); padding: 0; overflow: hidden; min-width: 270px; }
  .custom-popup .leaflet-popup-content { margin: 0; }
  .custom-popup .leaflet-popup-tip { background: #fff; }
  .popup-head { background: var(--ink); padding: 14px 16px 12px; }
  .popup-head h3 { font-family: "Syne", sans-serif; font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 3px; }
  .popup-head .popup-addr { font-size: 11px; color: #8a9aaa; }
  .popup-head .popup-icons { display: flex; gap: 6px; margin-top: 8px; }
  .popup-icon-chip { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,.1); border-radius: 4px; padding: 3px 8px; }
  .popup-icon-chip .material-symbols-outlined { font-size: 16px; color: #fff; }
  .popup-icon-chip span.label { font-size: 11px; color: #cdd6de; }
  .popup-body { padding: 10px 16px 14px; }
  .popup-row { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; border-bottom: 1px solid var(--border); color: var(--ink); }
  .popup-row:last-child { border-bottom: none; }
  .popup-row strong { color: var(--muted); font-weight: 500; }
  .popup-section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: #8a9aaa; margin: 10px 0 6px; }
  .marker-wrap { display: flex; flex-direction: column; align-items: center; }
  .marker-pin { width: 38px; height: 38px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 10px rgba(0,0,0,0.28); border: 2px solid #fff; }
  .marker-pin .material-symbols-outlined { transform: rotate(45deg); font-size: 19px; color: #fff; }
  /* LIGHTBOX */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,.88); align-items: center; justify-content: center;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 92vw; max-height: 88vh; border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,.6); }
  #lightbox-close {
    position: absolute; top: 18px; right: 22px;
    color: #fff; font-size: 32px; cursor: pointer; line-height: 1;
    background: none; border: none; font-family: sans-serif;
  }
  #lightbox-prev, #lightbox-next {
    position: absolute; top: 50%; transform: translateY(-50%);
    color: #fff; font-size: 40px; cursor: pointer;
    background: rgba(255,255,255,.1); border: none; border-radius: 50%;
    width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
  }
  #lightbox-prev { left: 16px; }
  #lightbox-next { right: 16px; }

  @media (max-width: 700px) {
    .layout { flex-direction: column-reverse; }
    .sidebar { width: 100%; height: 40dvh; border-right: none; border-top: 1px solid var(--border); }
    #map { height: 60dvh; flex: none; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>
<header>
  <div class="logo-mark">R</div>
  <h1>Rottas <span>Engenharia</span> — Obras</h1>
  <div class="header-stats">
    <div class="stat"><div class="stat-num">11</div><div class="stat-label">Obras</div></div>
    <div class="stat"><div class="stat-num">3.718</div><div class="stat-label">Unidades</div></div>
    <div class="stat"><div class="stat-num">2</div><div class="stat-label">Estados</div></div>
  </div>
</header>
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLightbox()">&times;</button>
  <button id="lightbox-prev" onclick="lightboxNav(-1)">&#8249;</button>
  <div style="text-align:center"><img id="lightbox-img" src="" alt="" style="display:block"/><div id="lightbox-date" style="color:#ccc;font-size:13px;margin-top:8px;font-family:Inter,sans-serif"></div></div>
  <button id="lightbox-next" onclick="lightboxNav(1)">&#8250;</button>
</div>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Empreendimentos</div>
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="todos">Todos</button>
        <button class="filter-btn" data-filter="SC">Santa Catarina</button>
        <button class="filter-btn" data-filter="PR">Paraná</button>
      </div>
    </div>
    <div class="obra-list" id="obraList"></div>
  </aside>
  <div id="map"></div>
</div>

function renderIcon(ic, size) {
  size = size || 18;
  if (ic === 'img_concreto') return '<img src="' + IMG_CONCRETO + '" style="width:' + size + 'px;height:' + size + 'px;object-fit:contain;vertical-align:middle" title="Parede de Concreto"/>';
  if (ic === 'img_bloco')    return '<img src="' + IMG_BLOCO    + '" style="width:' + size + 'px;height:' + size + 'px;object-fit:contain;vertical-align:middle" title="Bloco de Concreto"/>';
  return '<span class="material-symbols-outlined" style="font-size:' + size + 'px">' + ic + '</span>';
}
// parede de concreto vertical   => domain (prédio) + deployed_code (concreto)
// parede de concreto horizontal => cottage (casa) + deployed_code (concreto)
// alvenaria estrutural em blocos de concreto => domain (prédio) + view_module (bloco)

function metodIcons(met) {
  const m = (met || '').toLowerCase();
  if (m.includes('prédio em parede') || m.includes('predioconcreto')) return [{ic:'domain',label:'Prédio'}, {ic:'img_concreto',label:'Parede Concreto'}];
  if (m.includes('casa em parede'))  return [{ic:'cottage',label:'Casa'}, {ic:'img_concreto',label:'Parede Concreto'}];
  if (m.includes('bloco'))           return [{ic:'domain',label:'Prédio'}, {ic:'img_bloco',label:'Bloco Concreto'}];
  return [];
}

function metodColor(met) {
  const m = (met || '').toLowerCase();
  if (m.includes('prédio em parede')) return '#e05c2a';
  if (m.includes('casa em parede'))   return '#e05c2a';
  if (m.includes('bloco'))            return '#1a4f7a';
  return '#555';
}

function criarIcone(obra) {
  const icons = metodIcons(obra.metodologia);
  const cor = metodColor(obra.metodologia);
  const icName = icons.length > 0 ? icons[0].ic : 'location_on';
  const icHTML = icName === 'img_concreto'
    ? '<img src="' + IMG_CONCRETO + '" style="width:19px;height:19px;object-fit:contain;transform:rotate(45deg)"/>'
    : icName === 'img_bloco'
    ? '<img src="' + IMG_BLOCO + '" style="width:19px;height:19px;object-fit:contain;transform:rotate(45deg)"/>'
    : '<span class="material-symbols-outlined" style="transform:rotate(45deg);font-size:19px;color:#fff">' + icName + '</span>';
  const html = '<div class="marker-pin" style="background:' + cor + '">' + icHTML + '</div>';
  return L.divIcon({ html, className: 'marker-wrap', iconSize: [38, 38], iconAnchor: [19, 38], popupAnchor: [0, -40] });
}

function setActive(id) {
  document.querySelectorAll('.obra-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-id="${id}"]`)?.classList.add('active');
  activeId = id;
}

function copiarDados(btn) {
  var texto = btn.getAttribute('data-copy');
  navigator.clipboard.writeText(texto).then(function() {
    var orig = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:15px;color:#2a7a3b">check_circle</span><span style="color:#2a7a3b">Copiado!</span>';
    setTimeout(function() { btn.innerHTML = orig; }, 2000);
  }).catch(function() {
    // fallback
    var ta = document.createElement('textarea');
    ta.value = texto;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    var orig = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:15px;color:#2a7a3b">check_circle</span><span style="color:#2a7a3b">Copiado!</span>';
    setTimeout(function() { btn.innerHTML = orig; }, 2000);
  });
}

    const cor = estadoCor(o.estado);
    const icons = metodIcons(o.metodologia);
    const iconsHTML = icons.map(ic => renderIcon(ic.ic, 15)).join('');

    const item = document.createElement('div');
    item.className = 'obra-item' + (o.id === activeId ? ' active' : '');
    item.dataset.id = o.id;
    item.innerHTML = `
      <div class="obra-name">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:${cor};color:#fff;font-size:10px;font-weight:700;flex-shrink:0">${String(o.id).slice(0,2)}</span>
        ${o.nome}
      </div>
      <div class="obra-location">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="${cor}" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${o.cidade}
      </div>
      <div class="obra-tags">
        <span class="tag estado-${o.estado}">${o.estado}</span>
        ${o.uh ? `<span class="tag uh">${o.uh} UH</span>` : ''}
        ${o.torres ? `<span class="tag torres">${o.torres} torres</span>` : ''}
        <span class="metod-icons">${iconsHTML}</span>
      </div>`;

    item.addEventListener('click', () => {
      setActive(o.id);
      map.setView([o.lat, o.lng], 14, { animate: true });
      markers[o.id].openPopup();
    });
    list.appendChild(item);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList(btn.dataset.filter);
  });
});

renderList('todos');

let _lbObras = null, _lbId = null, _lbIdx = 0;
function openLightbox(el, idx) {
  var obraId = el.getAttribute ? el.getAttribute('data-oid') : el;
  var i = el.getAttribute ? parseInt(el.getAttribute('data-idx')) : idx;
  _lbId = obraId; _lbIdx = i;
  _lbObras = obras;
  const o = obras.find(x => String(x.id) === String(obraId));
  if (!o || !o.fotos) return;
  document.getElementById('lightbox-img').src = o.fotos[i].src;
  document.getElementById('lightbox-date').textContent = o.fotos[i].data || '';
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
function lightboxNav(dir) {
  const o = _lbObras.find(x => x.id === _lbId);
  if (!o || !o.fotos) return;
  _lbIdx = (_lbIdx + dir + o.fotos.length) % o.fotos.length;
  document.getElementById('lightbox-img').src = o.fotos[_lbIdx].src;
  document.getElementById('lightbox-date').textContent = o.fotos[_lbIdx].data || '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });

</script>
